<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Smart Notice Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen overflow-hidden">

<!-- 🌌 Canvas Background -->
<canvas id="bgCanvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

<!-- 📝 Signup Card -->
<div class="signup-card backdrop-blur-xl bg-white/10 border border-white/20 
            shadow-2xl rounded-2xl p-8 w-96 text-white">

    <h2 class="text-3xl font-bold text-center mb-6">Create Account</h2>

    <form method="POST" class="space-y-4">

        <input type="text" name="username" placeholder="Username"
            class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30
                   focus:outline-none focus:ring-2 focus:ring-blue-400"
            required>

        <input type="email" name="email" placeholder="Email"
            class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30
                   focus:outline-none focus:ring-2 focus:ring-blue-400"
            required>

        <input type="password" name="password" placeholder="Password"
            class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30
                   focus:outline-none focus:ring-2 focus:ring-blue-400"
            required>

        <!-- Role Selection -->
        <select name="role"
            class="w-full px-4 py-2 rounded-lg bg-white/20 border border-white/30
                   text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
            required>
            <option value="" class="text-black">Select Role</option>
            <option value="admin" class="text-black">Admin</option>
            <option value="teacher" class="text-black">Teacher</option>
            <option value="student" class="text-black">Student</option>
        </select>

        <button type="submit"
            class="w-full bg-green-600 hover:bg-green-700 
                   transition duration-300 py-2 rounded-lg font-semibold">
            Sign Up
        </button>

    </form>

    <p class="text-center mt-4 text-sm">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-blue-400 hover:underline">
            Login
        </a>
    </p>

</div>

<!-- ✨ Anime Animation -->
<script>
anime({
    targets: '.signup-card',
    scale: [0.8, 1],
    opacity: [0, 1],
    duration: 1400,
    easing: 'easeOutExpo'
});
</script>

<!-- 🌌 Canvas Background -->
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2 + 1,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(16,185,129,0.6)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
